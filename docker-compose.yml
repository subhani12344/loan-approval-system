version: '3'
services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@localhost:5432/loan_approval_db
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: cd /app && npm install && npm run dev

  ml-service:
    build: ./ml-service
    ports:
      - '5000:5000'
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models/hdi_prediction_model.pkl
    volumes:
      - ./ml-service:/app/ml-service
      - ./models:/app/models
    restart: unless-stopped

  prediction-worker:
    build: ./ml-service
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./ml-service:/app/ml-service
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - ./redis-data:/data

volumes:
  app:
  ml-service:
  redis-data:
